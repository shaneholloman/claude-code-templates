name = "aitmpl-dashboard"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

pages_build_output_dir = "./dist"

# Secrets are set via Cloudflare Dashboard or `wrangler secret put`:
# PUBLIC_CLERK_PUBLISHABLE_KEY
# CLERK_SECRET_KEY
# SUPABASE_URL
# SUPABASE_SERVICE_ROLE_KEY
# NEON_DATABASE_URL
# DISCORD_APP_ID
# DISCORD_BOT_TOKEN
# DISCORD_PUBLIC_KEY
# DISCORD_WEBHOOK_URL_CHANGELOG
# PUBLIC_GITHUB_CLIENT_ID
# GITHUB_CLIENT_SECRET
#
# Cron jobs (claude-code-check, health-check) are handled by the separate
# cloudflare-workers/crons Worker, not by this Pages project.
